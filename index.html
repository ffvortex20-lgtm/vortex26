<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Admin - Sistema Antigo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #16161d; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .group-card { background: #000; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid var(--primary); }
        .btns { display: flex; gap: 5px; margin-top: 10px; }
        .btn-del { background: #ff4757; }
    </style>
</head>
<body>

<div class="container">
    <h2>👑 Vortex Admin</h2>
    <div style="background:#000; padding:15px; border-radius:10px;">
        <input type="text" id="name" placeholder="Nome do Grupo">
        <input type="text" id="pic" placeholder="URL da Foto">
        <button onclick="criar()">CRIAR GRUPO</button>
    </div>

    <div id="lista">
        <h3 style="margin-top:20px;">📂 Meus Grupos</h3>
    </div>
</div>

<script>
    // CONFIGURAÇÃO DO SEU FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function criar() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('pic').value;
        if(!n || !p) return;

        const id = db.ref('groups').push().key;
        const token = Math.random().toString(36).substring(7);

        db.ref('groups/' + id).set({
            id: id,
            name: n,
            pic: p,
            token: token,
            status: "aberto"
        });
        document.getElementById('name').value = "";
        document.getElementById('pic').value = "";
    }

    db.ref('groups').on('value', snap => {
        const divLista = document.getElementById('lista');
        divLista.innerHTML = "<h3>📂 Meus Grupos</h3>";
        snap.forEach(child => {
            const g = child.val();
            divLista.innerHTML += `
                <div class="group-card">
                    <b>${g.name}</b><br>
                    <div class="btns">
                        <button onclick="copiar('${g.id}', '${g.token}')">Copiar Link</button>
                        <button class="btn-del" onclick="deletar('${g.id}')">Excluir</button>
                    </div>
                </div>
            `;
        });
    });

    function deletar(id) {
        if(confirm("Apagar tudo?")) {
            db.ref('groups/' + id).remove();
            db.ref('messages/' + id).remove();
        }
    }

    function copiar(id, t) {
        const url = window.location.href.replace('index.html', 'chat.html') + `?g=${id}&t=${t}`;
        navigator.clipboard.writeText(url);
        alert("Link Copiado!");
    }
</script>
</body>
</html>
