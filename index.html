<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Admin - Criador de Grupos</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        h1 { color: var(--primary); font-size: 22px; text-align: center; margin-bottom: 20px; }
        .section { background: #000; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; }
        h3 { font-size: 14px; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; }
        input { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        button { cursor: pointer; border: none; padding: 12px; border-radius: 10px; font-weight: bold; color: white; transition: 0.3s; width: 100%; background: var(--primary); }
        button:active { transform: scale(0.98); }
        .status { padding: 10px; text-align: center; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 1px solid #333; }
        .online { color: #28a745; background: rgba(40,167,69,0.1); border-color: #28a745; }
        .offline { color: #dc3545; background: rgba(220,53,69,0.1); border-color: #dc3545; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 Vortex Manager</h1>
    
    <div id="st" class="status">CARREGANDO...</div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <button style="background:#28a745" onclick="setChat(true)">ABRIR GRUPO</button>
        <button style="background:#dc3545" onclick="setChat(false)">FECHAR GRUPO</button>
    </div>

    <div class="section">
        <h3>✨ Configurar Grupo (Exclusivo Admin)</h3>
        <input type="text" id="gn" placeholder="Nome do Grupo (Ex: Turma do Vortex)">
        <input type="text" id="gp" placeholder="URL da Foto do Grupo">
        <button onclick="updateGroup()">CRIAR / ATUALIZAR GRUPO</button>
    </div>

    <div class="section">
        <h3>🛡️ Promover Membro</h3>
        <input type="text" id="admN" placeholder="Nome exato do usuário...">
        <button style="background:#333" onclick="giveAdmin()">DAR COROA 👑</button>
    </div>

    <div class="section">
        <h3>🔗 Convite</h3>
        <button style="background:#444" onclick="copyLink()">COPIAR LINK DO CHAT</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        authDomain: "chat-4b3e3.firebaseapp.com",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
        storageBucket: "chat-4b3e3.firebasestorage.app",
        messagingSenderId: "445315176420",
        appId: "1:445315176420:web:cc468a5c89b8706a7059f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.setChat = (s) => set(ref(db, 'chatStatus'), s);

    window.updateGroup = () => {
        const name = document.getElementById('gn').value;
        const pic = document.getElementById('gp').value;
        if(name && pic) {
            set(ref(db, 'groupConfig'), { name, pic })
            .then(() => Swal.fire('Grupo Criado!', '', 'success'));
        }
    };

    window.giveAdmin = () => {
        const user = document.getElementById('admN').value.trim();
        if(user) set(ref(db, 'admins/' + user.toLowerCase()), true).then(() => Swal.fire('Admin Adicionado!'));
    };

    window.copyLink = () => {
        const url = window.location.href.replace('index.html', 'chat.html');
        navigator.clipboard.writeText(url);
        Swal.fire('Link Copiado!');
    };

    onValue(ref(db, 'chatStatus'), s => {
        const el = document.getElementById('st');
        el.innerText = s.val() ? "GRUPO ATIVO" : "GRUPO DESATIVADO";
        el.className = `status ${s.val() ? 'online' : 'offline'}`;
    });
</script>
</body>
</html>
