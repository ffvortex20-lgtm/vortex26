<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Admin - Master</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        h1 { color: var(--primary); font-size: 22px; text-align: center; }
        .status-badge { padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; text-align: center; border: 1px solid #333; }
        .open { background: rgba(40, 167, 69, 0.1); color: #28a745; border-color: #28a745; }
        .closed { background: rgba(220, 53, 69, 0.1); color: #dc3545; border-color: #dc3545; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { cursor: pointer; border: none; padding: 12px; border-radius: 10px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-open { background: #28a745; } .btn-close { background: #dc3545; }
        .section { background: #000; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; }
        input { background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 8px; outline: none; }
        .btn-main { background: var(--primary); width: 100%; }
        .msg-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 Vortex Control</h1>
    <div id="statusB" class="status-badge">Carregando...</div>
    <div class="grid">
        <button class="btn-open" onclick="setStatus(true)">ABRIR CHAT</button>
        <button class="btn-close" onclick="setStatus(false)">FECHAR CHAT</button>
    </div>
    <div class="section">
        <h3>🏠 Perfil do Grupo</h3>
        <input type="text" id="gName" placeholder="Nome do Grupo">
        <input type="text" id="gPic" placeholder="URL da Foto do Grupo">
        <button class="btn-main" onclick="saveGroup()">Atualizar Grupo</button>
    </div>
    <div class="section">
        <h3>🛡️ Promover Admin</h3>
        <input type="text" id="targetU" placeholder="Nome do usuário...">
        <button class="btn-main" onclick="promo()">Dar Admin</button>
    </div>
    <div class="section">
        <h3>🔗 Link do Chat</h3>
        <div id="linkDisplay" style="font-size:10px; color:var(--primary); margin-bottom:5px;"></div>
        <button class="btn-main" style="background:#333" onclick="copyL()">Copiar Link</button>
    </div>
    <div class="section">
        <h3>👁️ Monitor</h3>
        <div id="monitor" style="height:150px; overflow-y:auto;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* SUAS CONFIGS AQUI */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Funções Globalizadas
    window.setStatus = (s) => set(ref(db, 'chatStatus'), s);
    window.saveGroup = () => {
        const n = document.getElementById('gName').value;
        const p = document.getElementById('gPic').value;
        if(n && p) set(ref(db, 'groupConfig'), { name: n, pic: p });
    };
    window.promo = () => {
        const u = document.getElementById('targetU').value.trim();
        if(u) set(ref(db, 'admins/' + u.toLowerCase()), true);
    };

    const chatL = window.location.href.replace('index.html', 'chat.html');
    document.getElementById('linkDisplay').innerText = chatL;
    window.copyL = () => { navigator.clipboard.writeText(chatL); Swal.fire('Copiado!'); };

    onValue(ref(db, 'chatStatus'), s => {
        const b = document.getElementById('statusB');
        b.innerText = s.val() ? "CHAT ABERTO" : "CHAT FECHADO";
        b.className = `status-badge ${s.val() ? 'open' : 'closed'}`;
    });

    onValue(ref(db, 'messages'), snap => {
        const m = document.getElementById('monitor'); m.innerHTML = "";
        snap.forEach(c => {
            m.innerHTML += `<div class="msg-item"><span>${c.val().user}: ${c.val().text.substring(0,15)}</span><button onclick="del('${c.key}')" style="background:red; font-size:9px;">X</button></div>`;
        });
    });
    window.del = (id) => remove(ref(db, 'messages/' + id));
</script>
</body>
</html>
