<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Master - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --card: #16161d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .box { background: #000; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: #fff; font-weight: bold; cursor: pointer; }
        .group-card { background: #1a1a24; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .controls { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .btn-sm { padding: 8px; font-size: 12px; flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <h2>👑 Vortex Master</h2>
    <div class="box">
        <h3>➕ Novo Grupo</h3>
        <input type="text" id="gName" placeholder="Nome do Grupo">
        <input type="text" id="gPic" placeholder="Link da Foto (URL)">
        <button onclick="criarGrupo()">CRIAR GRUPO</button>
    </div>

    <div id="listaGrupos">
        <h3>📂 Meus Grupos</h3>
        <p id="loading">Sincronizando com Firebase...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // SUBSTITUA PELAS SUAS CONFIGS DO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        databaseURL: "https://seu-projeto.firebaseio.com",
        projectId: "seu-projeto",
        appId: "1:..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const gerarToken = () => Math.random().toString(36).substring(2, 10);

    window.criarGrupo = () => {
        const name = document.getElementById('gName').value;
        const pic = document.getElementById('gPic').value;
        if(!name || !pic) return Swal.fire('Erro', 'Preencha nome e foto', 'error');

        const novoRef = push(ref(db, 'groups'));
        set(novoRef, {
            id: novoRef.key,
            name: name,
            pic: pic,
            isOpen: true,
            inviteToken: gerarToken()
        }).then(() => {
            Swal.fire('Sucesso', 'Grupo criado!', 'success');
            document.getElementById('gName').value = "";
            document.getElementById('gPic').value = "";
        });
    };

    onValue(ref(db, 'groups'), (snap) => {
        const lista = document.getElementById('listaGrupos');
        lista.innerHTML = "<h3>📂 Meus Grupos</h3>";
        if(!snap.exists()) lista.innerHTML += "<p>Nenhum grupo ativo.</p>";
        
        snap.forEach((child) => {
            const g = child.val();
            const div = document.createElement('div');
            div.className = 'group-card';
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${g.pic}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <b>${g.name}</b>
                </div>
                <div class="controls">
                    <button class="btn-sm" onclick="toggle('${g.id}', ${!g.isOpen})">${g.isOpen ? 'Fechar' : 'Abrir'}</button>
                    <button class="btn-sm" style="background:#444" onclick="copiar('${g.id}', '${g.inviteToken}')">Link</button>
                    <button class="btn-sm" style="background:#d32f2f" onclick="deletar('${g.id}')">Excluir</button>
                </div>
            `;
            lista.appendChild(div);
        });
    });

    window.toggle = (id, status) => update(ref(db, `groups/${id}`), { isOpen: status });
    window.deletar = (id) => {
        if(confirm("Apagar grupo e mensagens?")) {
            remove(ref(db, `groups/${id}`));
            remove(ref(db, `messages/${id}`));
        }
    };
    window.copiar = (id, t) => {
        const url = window.location.href.replace('index.html', 'chat.html') + `?g=${id}&t=${t}`;
        navigator.clipboard.writeText(url);
        Swal.fire('Copiado!', 'Link de convite pronto.', 'success');
    };
</script>
</body>
</html>
