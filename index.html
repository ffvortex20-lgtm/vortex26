<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Control - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --card: #161616; --text: #eee; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); font-size: 24px; margin-bottom: 25px; text-align: center; }
        .status-badge { padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; border: 1px solid #333; transition: 0.3s; text-align: center; }
        .open { background: #28a74511; color: #28a745; border-color: #28a745; }
        .closed { background: #dc354511; color: #dc3545; border-color: #dc3545; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { cursor: pointer; border: none; padding: 15px; border-radius: 12px; font-weight: 600; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-open { background: #28a745; }
        .btn-close { background: #dc3545; }
        .btn-promo { background: var(--primary); width: 100%; }
        .section { background: #000; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; }
        input { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; width: calc(100% - 24px); margin-bottom: 10px; outline: none; }
        .msg-list { text-align: left; height: 250px; overflow-y: auto; }
        .msg-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; align-items: center; font-size: 14px; }
        .del-btn { background: #ff4757; padding: 5px 10px; border-radius: 5px; font-size: 11px; }
        .link-display { background: #111; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #8a2be2; word-break: break-all; margin-bottom: 10px; border: 1px dashed #333; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-shield-alt"></i> Painel Admin</h1>
    
    <div id="statusBadge" class="status-badge">Carregando...</div>

    <div class="grid-btns">
        <button class="btn-open" id="btnOpen"><i class="fas fa-lock-open"></i> Abrir Chat</button>
        <button class="btn-close" id="btnClose"><i class="fas fa-lock"></i> Fechar Chat</button>
    </div>

    <div class="section">
        <h3 style="margin-top:0"><i class="fas fa-link"></i> Link de Convite (Usuários)</h3>
        <div class="link-display" id="chatLinkUrl">Gerando link...</div>
        <button onclick="copyRealChatLink()" style="background: #333; width: 100%;"><i class="fas fa-copy"></i> Copiar Link do Chat</button>
    </div>

    <div class="section">
        <h3 style="margin-top:0"><i class="fas fa-crown"></i> Promover Usuário</h3>
        <input type="text" id="targetUser" placeholder="Nome exato do usuário...">
        <button class="btn-promo" id="promoBtn">Dar Admin</button>
    </div>

    <h3><i class="fas fa-history"></i> Monitor de Mensagens</h3>
    <div class="msg-list" id="monitor"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        authDomain: "chat-4b3e3.firebaseapp.com",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
        storageBucket: "chat-4b3e3.firebasestorage.app",
        messagingSenderId: "445315176420",
        appId: "1:445315176420:web:cc468a5c89b8706a7059f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Lógica para gerar o link correto do CHAT
    const currentUrl = window.location.href;
    const finalChatUrl = currentUrl.includes('index.html') 
        ? currentUrl.replace('index.html', 'chat.html') 
        : currentUrl.endsWith('/') ? currentUrl + 'chat.html' : currentUrl + '/chat.html';

    document.getElementById('chatLinkUrl').innerText = finalChatUrl;

    window.copyRealChatLink = () => {
        navigator.clipboard.writeText(finalChatUrl);
        Swal.fire('Copiado!', 'O link da sala de chat está na sua área de transferência.', 'success');
    };

    // Status e Botões
    onValue(ref(db, 'chatStatus'), s => {
        const badge = document.getElementById('statusBadge');
        const isOpen = s.val();
        badge.innerText = isOpen ? "STATUS: CHAT ABERTO" : "STATUS: CHAT FECHADO";
        badge.className = `status-badge ${isOpen ? 'open' : 'closed'}`;
    });

    document.getElementById('btnOpen').onclick = () => set(ref(db, 'chatStatus'), true);
    document.getElementById('btnClose').onclick = () => set(ref(db, 'chatStatus'), false);

    // Promover
    document.getElementById('promoBtn').onclick = () => {
        const user = document.getElementById('targetUser').value.trim();
        if(user) {
            set(ref(db, 'admins/' + user.toLowerCase()), true);
            Swal.fire('Coroa Entregue!', `${user} agora é Admin.`, 'success');
            document.getElementById('targetUser').value = "";
        }
    };

    // Monitoramento
    onValue(ref(db, 'messages'), (snap) => {
        const div = document.getElementById('monitor');
        div.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            const textPreview = m.type === 'audio' ? '🎤 Áudio' : m.text;
            div.innerHTML += `<div class="msg-item">
                <span><b>${m.user}:</b> ${textPreview.substring(0,20)}...</span>
                <button class="del-btn" onclick="removeMsg('${c.key}')">Apagar</button>
            </div>`;
        });
    });

    window.removeMsg = (id) => remove(ref(db, 'messages/' + id));
</script>
</body>
</html>
