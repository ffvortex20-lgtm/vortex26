<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --card: #161616; --text: #eee; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .status-badge { padding: 10px 20px; border-radius: 50px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .open { background: #28a74522; color: #28a745; border: 1px solid #28a745; }
        .closed { background: #dc354522; color: #dc3545; border: 1px solid #dc3545; }
        button { cursor: pointer; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; transition: 0.3s; margin: 5px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .invite-box { background: #000; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px dashed var(--primary); word-break: break-all; }
        .msg-list { text-align: left; background: #000; border-radius: 10px; padding: 10px; height: 300px; overflow-y: auto; margin-top: 10px; }
        .msg-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; align-items: center; font-size: 14px; }
        .del-btn { background: #ff4757; font-size: 11px; padding: 4px 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 Painel Administrativo</h1>
    <div id="statusBadge" class="status-badge closed">Carregando status...</div>
    
    <div>
        <button class="btn-main" id="btnOpen">ABRIR CHAT</button>
        <button class="btn-danger" id="btnClose">FECHAR CHAT</button>
    </div>

    <div class="invite-box">
        <span id="inviteLink">Carregando link...</span>
        <button class="btn-main" style="padding: 5px 10px; font-size: 12px; margin-left: 10px;" id="copyBtn">Copiar Link do Chat</button>
    </div>

    <h3>Monitoramento em Tempo Real</h3>
    <div class="msg-list" id="monitor"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        authDomain: "chat-4b3e3.firebaseapp.com",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
        storageBucket: "chat-4b3e3.firebasestorage.app",
        messagingSenderId: "445315176420",
        appId: "1:445315176420:web:cc468a5c89b8706a7059f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Gerar Link do Chat Corretamente
    const currentUrl = window.location.href;
    const chatUrl = currentUrl.substring(0, currentUrl.lastIndexOf("/")) + "/chat.html";
    const linkDisplay = document.getElementById('inviteLink');
    linkDisplay.innerText = chatUrl;

    // Função Copiar
    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(chatUrl);
        Swal.fire({
            title: 'Copiado!',
            text: 'Link do CHAT copiado para a área de transferência.',
            icon: 'success',
            confirmButtonColor: '#8a2be2'
        });
    };

    // Controle de Status
    document.getElementById('btnOpen').onclick = () => set(ref(db, 'chatStatus'), true);
    document.getElementById('btnClose').onclick = () => set(ref(db, 'chatStatus'), false);

    onValue(ref(db, 'chatStatus'), (snap) => {
        const badge = document.getElementById('statusBadge');
        badge.innerText = snap.val() ? "CHAT ONLINE" : "CHAT OFFLINE";
        badge.className = `status-badge ${snap.val() ? 'open' : 'closed'}`;
    });

    // Monitoramento e Exclusão
    onValue(ref(db, 'messages'), (snap) => {
        const monitor = document.getElementById('monitor');
        monitor.innerHTML = "";
        if (!snap.exists()) {
            monitor.innerHTML = "<p style='text-align:center; color:#666;'>Nenhuma mensagem enviada.</p>";
            return;
        }
        snap.forEach(child => {
            const m = child.val();
            const div = document.createElement('div');
            div.className = 'msg-item';
            
            // Lógica para mostrar se é texto ou mídia no monitor
            let preview = m.text;
            if (m.type === 'audio') preview = "🎤 Áudio enviado";
            if (m.text.match(/\.(jpeg|jpg|gif|png|webp|mp4)/i)) preview = "📷 Mídia enviada";
            
            div.innerHTML = `<span><b>${m.user}:</b> ${preview.substring(0, 30)}...</span>
                             <button class="del-btn" id="del-${child.key}">Apagar</button>`;
            monitor.appendChild(div);

            document.getElementById(`del-${child.key}`).onclick = () => {
                remove(ref(db, `messages/${child.key}`));
            };
        });
    });
</script>
</body>
</html>
