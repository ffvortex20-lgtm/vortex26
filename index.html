<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Vortex</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0b; --card: #16161e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; }
        button { cursor: pointer; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn-on { background: #28a745; color: white; }
        .btn-off { background: #dc3545; color: white; }
        .btn-promo { background: var(--primary); color: white; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; width: 70%; margin-bottom: 10px; }
        .list { text-align: left; background: #000; height: 200px; overflow-y: auto; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 14px; }
        .msg-item { border-bottom: 1px solid #222; padding: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="box">
    <h1>👑 Controle Total</h1>
    
    <div style="margin-bottom: 20px;">
        <button class="btn-on" id="openChat">ABRIR CHAT</button>
        <button class="btn-off" id="closeChat">FECHAR CHAT</button>
    </div>

    <hr style="border: 0.5px solid #333;">

    <h3>Dar Admin a Usuário</h3>
    <input type="text" id="targetUser" placeholder="Nome exato do usuário...">
    <button class="btn-promo" id="promoBtn">Promover</button>

    <div style="background: #000; padding: 10px; margin-top: 20px; border-radius: 8px; word-break: break-all;">
        <small>Link do Chat:</small><br>
        <b id="chatLink">carregando...</b><br>
        <button onclick="copyChatLink()" style="font-size: 10px; padding: 5px;">Copiar Link</button>
    </div>

    <h3>Monitor de Mensagens</h3>
    <div class="list" id="monitor"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        authDomain: "chat-4b3e3.firebaseapp.com",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
        storageBucket: "chat-4b3e3.firebasestorage.app",
        messagingSenderId: "445315176420",
        appId: "1:445315176420:web:cc468a5c89b8706a7059f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Abrir/Fechar
    document.getElementById('openChat').onclick = () => set(ref(db, 'chatStatus'), true);
    document.getElementById('closeChat').onclick = () => set(ref(db, 'chatStatus'), false);

    // Promover
    document.getElementById('promoBtn').onclick = () => {
        const user = document.getElementById('targetUser').value.trim();
        if(user) {
            set(ref(db, 'admins/' + user.toLowerCase()), true);
            Swal.fire('Promovido!', user + ' agora é Admin.', 'success');
            document.getElementById('targetUser').value = "";
        }
    };

    // Link do Chat
    const linkChat = window.location.href.replace('index.html', 'chat.html');
    document.getElementById('chatLink').innerText = linkChat;
    window.copyChatLink = () => {
        navigator.clipboard.writeText(linkChat);
        Swal.fire('Copiado!', '', 'success');
    };

    // Monitor
    onValue(ref(db, 'messages'), (snap) => {
        const div = document.getElementById('monitor');
        div.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            div.innerHTML += `<div class="msg-item">
                <span><b>${m.user}:</b> ${m.text.substring(0,20)}</span>
                <button onclick="removeMsg('${c.key}')" style="background:red; color:white; font-size:9px;">X</button>
            </div>`;
        });
    });

    window.removeMsg = (id) => remove(ref(db, 'messages/' + id));
</script>
</body>
</html>
