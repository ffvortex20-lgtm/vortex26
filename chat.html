<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex - Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8a2be2; --bg: #0b0b0e; --panel: #16161d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: var(--panel); display: flex; flex-direction: column; position: relative; }
        
        /* Lista de Grupos */
        .wp-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .wp-item:hover { background: #1f1f29; }
        .wp-item img { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; object-fit: cover; border: 2px solid var(--primary); }

        /* Chat */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { padding: 10px; border-radius: 15px; max-width: 85%; font-size: 14px; position: relative; }
        .received { background: #20202b; align-self: flex-start; border-bottom-left-radius: 2px; }
        .owner { background: #2d1b4d; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid var(--primary); }
        
        .header { background: #1f1f29; padding: 10px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
        .header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .input-area { background: #1f1f29; padding: 10px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: #2c2c3a; border: none; color: white; padding: 12px; border-radius: 25px; outline: none; }
        .btn-round { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        audio { filter: invert(1); max-width: 100%; height: 35px; margin-top: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">
    <div id="list-screen">
        <div style="padding: 20px; background: #1f1f29; font-size: 22px; font-weight: bold; border-bottom: 1px solid #333;">Mensagens</div>
        <div id="groups-container"></div>
    </div>

    <div id="chat-screen" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
        <div class="header">
            <button onclick="location.href='chat.html'" style="background:none; border:none; color:white; font-size:18px;"><i class="fas fa-arrow-left"></i></button>
            <img id="h-pic" src="">
            <b id="h-name">Grupo</b>
        </div>
        <div id="chat-window"></div>
        <div class="input-area" id="ctrls">
            <div style="flex: 1; background: #2c2c3a; border-radius: 25px; display: flex; align-items: center; padding: 0 15px;">
                <input type="text" id="msgI" placeholder="Mensagem">
                <i class="fas fa-microphone" id="recBtn" style="color: #888; cursor: pointer; font-size: 18px;"></i>
            </div>
            <button class="btn-round" onclick="enviarT()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        authDomain: "chat-4b3e3.firebaseapp.com",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
        storageBucket: "chat-4b3e3.firebasestorage.app",
        messagingSenderId: "445315176420",
        appId: "1:445315176420:web:cc468a5c89b8706a7059f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const gid = params.get('g');
    const token = params.get('t');
    const myName = localStorage.getItem('vortex_u') || "Membro " + Math.floor(Math.random()*999);

    if (!gid) {
        onValue(ref(db, 'groups'), snap => {
            const container = document.getElementById('groups-container');
            container.innerHTML = "";
            snap.forEach(c => {
                const g = c.val();
                container.innerHTML += `
                    <div class="wp-item" onclick="location.href='chat.html?g=${g.id}&t=${g.inviteToken}'">
                        <img src="${g.pic}">
                        <div style="flex:1">
                            <b>${g.name}</b><br>
                            <span style="font-size:12px; color:#888">${g.isOpen ? 'Online' : 'Fechado'}</span>
                        </div>
                    </div>`;
            });
        });
    } else {
        document.getElementById('list-screen').classList.add('hidden');
        document.getElementById('chat-screen').classList.remove('hidden');

        onValue(ref(db, `groups/${gid}`), snap => {
            const g = snap.val();
            if(!g || g.inviteToken !== token) {
                Swal.fire('Acesso Negado!', 'Link inválido ou expirado.', 'error').then(() => location.href='chat.html');
                return;
            }
            document.getElementById('h-name').innerText = g.name;
            document.getElementById('h-pic').src = g.pic;
            document.getElementById('ctrls').style.display = g.isOpen ? 'flex' : 'none';
        });

        onValue(ref(db, `messages/${gid}`), snap => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const div = document.createElement('div');
                div.className = `msg ${m.user === myName ? 'owner' : 'received'}`;
                let content = m.text;
                if(m.type === 'audio') content = `<audio src="${m.text}" controls></audio>`;
                div.innerHTML = `<b style="font-size:10px; color:var(--primary)">${m.user}</b><br>${content}`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    function send(t, type='text') {
        push(ref(db, `messages/${gid}`), { user: myName, text: t, type: type, time: Date.now() });
    }

    window.enviarT = () => {
        const i = document.getElementById('msgI');
        if(i.value) { send(i.value); i.value = ""; }
    };

    // Lógica do Áudio Base64
    let recorder;
    const rb = document.getElementById('recBtn');
    rb.onpointerdown = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks));
            reader.onloadend = () => send(reader.result, 'audio');
            stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        rb.style.color = "red";
    };
    rb.onpointerup = () => { if(recorder) { recorder.stop(); rb.style.color = "#888"; } };
</script>
</body>
</html>
