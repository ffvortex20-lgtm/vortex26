<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Chat - VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8a2be2; --bg: #0b0b0e; --panel: #16161d; --user-msg: #20202b; --owner-msg: #2d1b4d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: var(--panel); position: relative; }
        
        /* Cabeçalho */
        .header { background: #1f1f29; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; z-index: 10; }
        .header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* Balões */
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; position: relative; font-size: 15px; word-wrap: break-word; }
        .msg.received { background: var(--user-msg); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.owner { background: var(--owner-msg); align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid var(--primary); }
        .msg b { font-size: 12px; display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
        .verified { color: #1da1f2; }
        .mention-all { background: #ff4757; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .msg a { color: #00d4ff; text-decoration: underline; }

        /* Mídia */
        img, video { width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        audio { width: 100%; margin-top: 5px; filter: invert(1); }

        /* Input Bar */
        .input-area { background: #1f1f29; padding: 12px; display: flex; align-items: center; gap: 8px; }
        .input-group { flex: 1; background: #2c2c3a; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; }
        input { background: none; border: none; color: #fff; padding: 10px; flex: 1; outline: none; font-size: 16px; }
        
        .btn-send { background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-send:active { transform: scale(0.9); }
        .recording { background: #ff4757 !important; animation: pulse 1s infinite; }

        /* Modal Perfil */
        #profile-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div id="profile-modal" class="hidden">
        <h2>Bem-vindo ao Vortex</h2>
        <input type="text" id="user-name" placeholder="Teu Nome" style="width: 80%; background: #222; margin-bottom: 10px; border-radius: 8px; padding: 10px; color: white; border: none;">
        <input type="text" id="user-pic" placeholder="URL da tua foto" style="width: 80%; background: #222; margin-bottom: 20px; border-radius: 8px; padding: 10px; color: white; border: none;">
        <button onclick="saveProfile()" style="background: var(--primary); padding: 12px 50px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer;">ENTRAR</button>
    </div>

    <div class="header">
        <img src="" id="head-pic">
        <div>
            <div id="head-name" style="font-weight:bold">Vortex Chat</div>
            <small id="status-label" style="color:#28a745">Online</small>
        </div>
    </div>

    <div id="chat-window"></div>

    <div class="input-area" id="controls">
        <button class="btn-send" style="background:none; color:#aaa; width: 30px;" onclick="openMediaPrompt()"><i class="fas fa-plus"></i></button>
        <div class="input-group">
            <input type="text" id="msg-input" placeholder="Mensagem...">
            <button id="record-btn" style="background:none; border:none; color:#aaa; cursor:pointer;"><i class="fas fa-microphone"></i></button>
        </div>
        <button class="btn-send" id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- COLA AS TUAS CONFIGS DO FIREBASE AQUI ---
    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        authDomain: "chat-4b3e3.firebaseapp.com",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
        storageBucket: "chat-4b3e3.firebasestorage.app",
        messagingSenderId: "445315176420",
        appId: "1:445315176420:web:cc468a5c89b8706a7059f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const CHAVE_MESTRE = "VORTEX_777";

    // 1. Lógica de Admin por Link
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('key') === CHAVE_MESTRE) localStorage.setItem('vortex_role', 'admin');

    // 2. Perfil
    window.saveProfile = () => {
        const n = document.getElementById('user-name').value;
        const p = document.getElementById('user-pic').value || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        if(n) {
            localStorage.setItem('vortex_user', n);
            localStorage.setItem('vortex_pic', p);
            location.reload();
        }
    };

    const myName = localStorage.getItem('vortex_user');
    const myPic = localStorage.getItem('vortex_pic');
    const myRole = localStorage.getItem('vortex_role');

    if(!myName) document.getElementById('profile-modal').classList.remove('hidden');
    else {
        document.getElementById('head-pic').src = myPic;
        document.getElementById('head-name').innerText = myName + (myRole === 'admin' ? " 👑" : "");
    }

    // 3. Enviar Texto e Links
    function sendMsg(text, type = 'text') {
        push(ref(db, 'messages'), {
            user: myName,
            pic: myPic,
            text: text,
            type: type,
            isOwner: myRole === 'admin',
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
    }

    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('msg-input');
        if(input.value) { sendMsg(input.value); input.value = ""; }
    };

    // 4. Botão + (Fotos/Vídeos)
    window.openMediaPrompt = async () => {
        const { value: url } = await Swal.fire({
            title: 'Enviar Link de Mídia',
            input: 'url',
            inputPlaceholder: 'Cola o link da imagem ou vídeo...',
            showCancelButton: true,
            confirmButtonColor: '#8a2be2'
        });
        if (url) sendMsg(url, 'media');
    };

    // 5. SISTEMA DE ÁUDIO (REINTEGRADO)
    let recorder;
    const recordBtn = document.getElementById('record-btn');

    recordBtn.onmousedown = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => sendMsg(reader.result, 'audio');
                stream.getTracks().forEach(track => track.stop());
            };
            recorder.start();
            recordBtn.classList.add('recording');
            recordBtn.style.color = "#ff4757";
        } catch (err) { alert("Permite o microfone para gravar!"); }
    };

    recordBtn.onmouseup = () => {
        if(recorder) {
            recorder.stop();
            recordBtn.classList.remove('recording');
            recordBtn.style.color = "#aaa";
        }
    };

    // 6. Receber Mensagens e Renderizar
    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank">${url}</a>`);
    }

    onValue(query(ref(db, 'messages'), limitToLast(40)), (snap) => {
        const win = document.getElementById('chat-window');
        win.innerHTML = "";
        snap.forEach(child => {
            const m = child.val();
            const div = document.createElement('div');
            div.className = `msg ${m.isOwner ? 'owner' : 'received'}`;
            
            let content = linkify(m.text);
            if(m.isOwner && content.includes("@todos")) {
                content = content.replace("@todos", "<span class='mention-all'>@TODOS</span>");
            }
            
            // Lógica de Mídia
            if(m.type === 'audio') content = `<audio src="${m.text}" controls></audio>`;
            else if(m.text.match(/\.(jpeg|jpg|gif|png|webp)/i)) content = `<img src="${m.text}">`;
            else if(m.text.match(/\.(mp4|webm)/i)) content = `<video src="${m.text}" controls></video>`;

            div.innerHTML = `
                <b style="color:${m.isOwner ? '#a29bfe' : '#b1b1b1'}">
                    ${m.user} ${m.isOwner ? '<i class="fas fa-check-circle verified"></i>' : ''}
                </b>
                ${content}
                <small style="display:block; text-align:right; font-size:10px; opacity:0.5;">${m.time}</small>
            `;
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
    });
</script>
</body>
</html>
