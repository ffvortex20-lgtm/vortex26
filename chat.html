<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8a2be2; --bg: #0b0b0e; --panel: #16161d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: var(--panel); position: relative; }
        
        /* Cabeçalho Estilo WhatsApp */
        .header { background: #1f1f29; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
        .header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #333; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0b0b0e; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; }
        .received { background: #20202b; align-self: flex-start; }
        .owner { background: #2d1b4d; align-self: flex-end; border: 1px solid var(--primary); }
        
        .input-area { background: #1f1f29; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .input-box { flex: 1; background: #2c2c3a; border-radius: 20px; display: flex; align-items: center; padding: 0 15px; }
        input { background: none; border: none; color: #fff; padding: 10px; flex: 1; outline: none; }
        .btn { width: 40px; height: 40px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; background: var(--primary); }
        
        #login { position: absolute; inset: 0; background: #0b0b0e; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        audio { filter: invert(1); width: 200px; }
    </style>
</head>
<body>
<div id="app">
    <div id="login" class="hidden">
        <h2>Vortex Chat</h2>
        <input type="text" id="nick" placeholder="Seu nome único" style="width: 70%; background: #222; margin-bottom: 10px;">
        <input type="text" id="avatar" placeholder="URL da sua foto" style="width: 70%; background: #222; margin-bottom: 20px;">
        <button onclick="entrar()" style="background: var(--primary); padding: 10px 40px; border-radius: 20px; border: none; color: white;">ENTRAR NO GRUPO</button>
    </div>

    <div class="header">
        <img id="gPicH" src="">
        <div>
            <div id="gNameH" style="font-weight: bold;">Carregando...</div>
            <small style="color: #28a745;">online</small>
        </div>
    </div>

    <div id="chat-window"></div>

    <div class="input-area" id="ctrl">
        <button class="btn" style="background:none; color:#888;" onclick="upMedia()"><i class="fas fa-plus"></i></button>
        <div class="input-box">
            <input type="text" id="msgI" placeholder="Mensagem">
            <button id="recBtn" style="background:none; border:none; color:#888;"><i class="fas fa-microphone"></i></button>
        </div>
        <button class="btn" onclick="enviar()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, query, limitToLast, get, set, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* SUAS CONFIGS AQUI */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. Login Nome Único
    window.entrar = async () => {
        const n = document.getElementById('nick').value.trim();
        const p = document.getElementById('avatar').value || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        if(!n) return;
        const s = await get(child(ref(db), `users/${n.toLowerCase()}`));
        if(s.exists()) return Swal.fire('Nome em uso!');
        await set(ref(db, `users/${n.toLowerCase()}`), true);
        localStorage.setItem('v_u', n); localStorage.setItem('v_p', p);
        location.reload();
    };

    const myN = localStorage.getItem('v_u'), myP = localStorage.getItem('v_p');
    let isA = false;
    if(!myN) document.getElementById('login').classList.remove('hidden');
    else onValue(ref(db, 'admins/'+myN.toLowerCase()), s => isA = !!s.val());

    // 2. Info do Grupo
    onValue(ref(db, 'groupConfig'), s => {
        if(s.exists()){ document.getElementById('gNameH').innerText = s.val().name; document.getElementById('gPicH').src = s.val().pic; }
    });

    // 3. Audio Corrigido
    let rec;
    document.getElementById('recBtn').onpointerdown = async (e) => {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        rec = new MediaRecorder(stream);
        let chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            const blob = new Blob(chunks, {type:'audio/ogg'});
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => sendMsg(reader.result, 'audio');
            stream.getTracks().forEach(t => t.stop());
        };
        rec.start();
        document.getElementById('recBtn').style.color = "red";
    };
    document.getElementById('recBtn').onpointerup = () => { if(rec){ rec.stop(); document.getElementById('recBtn').style.color = "#888"; }};

    // 4. Enviar e Receber
    function sendMsg(t, type='text'){
        push(ref(db, 'messages'), { user: myN, pic: myP, text: t, type: type, isOwner: isA, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    }
    window.enviar = () => { const i = document.getElementById('msgI'); if(i.value){ sendMsg(i.value); i.value=""; }};
    window.upMedia = async () => { const {value:u} = await Swal.fire({title:'Link da Mídia', input:'url'}); if(u) sendMsg(u, 'media'); };

    onValue(query(ref(db, 'messages'), limitToLast(30)), snap => {
        const w = document.getElementById('chat-window'); w.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            const div = document.createElement('div');
            div.className = `msg ${m.isOwner ? 'owner' : 'received'}`;
            let content = m.text;
            if(m.type === 'audio') content = `<audio src="${m.text}" controls></audio>`;
            else if(m.text.match(/\.(jpg|png|gif)/i)) content = `<img src="${m.text}" style="width:100%">`;
            div.innerHTML = `<b style="font-size:10px; color:${m.isOwner?'#a29bfe':'#888'}">${m.user}</b><br>${content}`;
            w.appendChild(div);
        });
        w.scrollTop = w.scrollHeight;
    });
</script>
</body>
</html>
