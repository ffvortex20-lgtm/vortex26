<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8a2be2; --bg: #0b0b0e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        #app { max-width: 500px; margin: 0 auto; background: #16161d; height: 100vh; display: flex; flex-direction: column; position: relative; }
        .hidden { display: none !important; }
        
        /* Telas */
        #login-screen, #lista-screen, #chat-screen { height: 100%; display: flex; flex-direction: column; }
        
        /* Lista */
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .item img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid var(--primary); object-fit: cover; }

        /* Chat */
        #win { flex: 1; overflow-y: auto; padding: 15px; background: #000; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; background: #20202b; max-width: 80%; position: relative; margin-bottom: 5px; }
        .msg img { width: 25px; height: 25px; border-radius: 50%; position: absolute; left: -35px; top: 5px; }
        .me { align-self: flex-end; background: #2d1b4d; border: 1px solid var(--primary); }
        .me img { left: auto; right: -35px; }

        .header { background: #1f1f29; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .bar { padding: 15px; background: #1f1f29; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #2c2c3a; color: #fff; outline: none; }
    </style>
</head>
<body>
<div id="app">
    <div id="login-screen" class="hidden" style="text-align:center; padding:40px;">
        <h2 style="color:var(--primary)">Vortex</h2>
        <input type="text" id="nick" placeholder="Seu nome...">
        <input type="text" id="userpic" placeholder="Link da sua foto...">
        <button onclick="salvarPerfil()" style="width:100%; margin-top:20px; padding:15px; background:var(--primary); color:#fff; border:none; border-radius:12px; font-weight:bold;">ENTRAR</button>
    </div>

    <div id="lista-screen" class="hidden">
        <div style="padding:20px; font-weight:bold; border-bottom:1px solid #333;">Conversas</div>
        <div id="container-grupos"></div>
    </div>

    <div id="chat-screen" class="hidden">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="location.href='chat.html'"></i>
            <img id="h-img" src="" style="width:40px; height:40px; border-radius:50%;">
            <b id="h-name"></b>
        </div>
        <div id="win"></div>
        <div id="bar" class="bar">
            <input type="text" id="txt" placeholder="Mensagem...">
            <button onclick="enviar()" style="background:var(--primary); color:white; border:none; width:45px; height:45px; border-radius:50%;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const myNick = localStorage.getItem('v_nick');
    const myPic = localStorage.getItem('v_pic');
    const url = new URLSearchParams(window.location.search);
    const gid = url.get('g'), tk = url.get('t');

    function salvarPerfil() {
        const n = document.getElementById('nick').value;
        const p = document.getElementById('userpic').value;
        if(n && p) {
            localStorage.setItem('v_nick', n);
            localStorage.setItem('v_pic', p);
            location.reload();
        }
    }

    // LÓGICA DE TELAS
    if(!myNick) {
        document.getElementById('login-screen').classList.remove('hidden');
    } else if(!gid) {
        document.getElementById('lista-screen').classList.remove('hidden');
        db.ref('groups').on('value', snap => {
            const c = document.getElementById('container-grupos');
            c.innerHTML = "";
            snap.forEach(child => {
                const g = child.val();
                c.innerHTML += `<div class="item" onclick="window.location.href='chat.html?g=${g.id}&t=${g.token}'">
                    <img src="${g.pic}"><b>${g.name}</b>
                </div>`;
            });
        });
    } else {
        document.getElementById('chat-screen').classList.remove('hidden');
        db.ref('groups/' + gid).on('value', snap => {
            const g = snap.val();
            if(!g || g.token !== tk) return window.location.href='chat.html';
            document.getElementById('h-name').innerText = g.name;
            document.getElementById('h-img').src = g.pic;
            document.getElementById('bar').style.display = g.status == 'aberto' ? 'flex' : 'none';
        });

        db.ref('messages/' + gid).on('value', snap => {
            const win = document.getElementById('win');
            win.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const isMe = m.user === myNick;
                win.innerHTML += `<div class="msg ${isMe?'me':''}" style="margin-${isMe?'right':'left'}:35px">
                    <img src="${m.pic}"><b>${m.user}</b><br>${m.text}
                </div>`;
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    function enviar() {
        const t = document.getElementById('txt').value;
        if(t) {
            db.ref('messages/'+gid).push({ user: myNick, pic: myPic, text: t });
            document.getElementById('txt').value = "";
        }
    }
</script>
</body>
</html>
