<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Chat</title>
    <style>
        :root { --primary: #8a2be2; --bg: #0f0f12; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: #16161d; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #252530; padding: 12px; border-radius: 15px; max-width: 80% }
        .msg b { color: var(--primary); display: block; font-size: 12px; }
        .input-area { background: #1f1f29; padding: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        input { flex: 1; background: #2c2c3a; border: none; padding: 12px; border-radius: 10px; color: #fff; outline: none; }
        button { background: var(--primary); border: none; padding: 10px; border-radius: 10px; color: white; cursor: pointer; }
        img, video { width: 100%; border-radius: 10px; margin-top: 5px; }
        audio { width: 100%; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-window"></div>
    <div id="closed" class="hidden" style="text-align: center; padding: 50px;">
        <h2>Chat Fechado 🔒</h2>
    </div>
    
    <div class="input-area" id="controls">
        <input type="text" id="name" placeholder="Nick" style="max-width: 80px;">
        <input type="text" id="msg" placeholder="Mensagem, link de foto ou vídeo...">
        <button id="send">🚀</button>
        <button id="record" style="background: #ff4757;">🎤 Gravar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        authDomain: "chat-4b3e3.firebaseapp.com",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
        storageBucket: "chat-4b3e3.firebasestorage.app",
        messagingSenderId: "445315176420",
        appId: "1:445315176420:web:cc468a5c89b8706a7059f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Verificar Status do Admin
    onValue(ref(db, 'chatStatus'), (snap) => {
        document.getElementById('controls').classList.toggle('hidden', !snap.val());
        document.getElementById('closed').classList.toggle('hidden', snap.val());
    });

    // Enviar Mensagem
    document.getElementById('send').onclick = () => {
        const text = document.getElementById('msg').value;
        const user = document.getElementById('name').value || "User";
        if(text) {
            push(ref(db, 'messages'), { user, text, type: 'text' });
            document.getElementById('msg').value = "";
        }
    };

    // Renderizar Mensagens (Texto, Imagem, Vídeo)
    onValue(query(ref(db, 'messages'), limitToLast(20)), (snap) => {
        const win = document.getElementById('chat-window');
        win.innerHTML = "";
        snap.forEach(child => {
            const m = child.val();
            const div = document.createElement('div');
            div.className = 'msg';
            
            let content = `<b>${m.user}</b>`;
            if (m.text.includes('.mp4') || m.text.includes('video')) {
                content += `<video src="${m.text}" controls></video>`;
            } else if (m.text.match(/\.(jpeg|jpg|gif|png|webp)/)) {
                content += `<img src="${m.text}">`;
            } else if (m.type === 'audio') {
                content += `<audio src="${m.text}" controls></audio>`;
            } else {
                content += `<span>${m.text}</span>`;
            }
            
            div.innerHTML = content;
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
    });

    // Sistema de Áudio (Simplificado via Base64 para evitar servidor de storage)
    let recorder;
    document.getElementById('record').onmousedown = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/ogg' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => {
                push(ref(db, 'messages'), { 
                    user: document.getElementById('name').value || "User", 
                    text: reader.result, 
                    type: 'audio' 
                });
            };
        };
        recorder.start();
        document.getElementById('record').innerText = "🔴 Gravando...";
    };
    document.getElementById('record').onmouseup = () => {
        recorder.stop();
        document.getElementById('record').innerText = "🎤 Gravar";
    };
</script>
</body>
</html>
