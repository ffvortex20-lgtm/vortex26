<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vortex Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0b0e; color: #fff; font-family: sans-serif; margin: 0; }
        #app { max-width: 500px; margin: 0 auto; background: #16161d; height: 100vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .item img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid #8a2be2; }
        #win { flex: 1; overflow-y: auto; padding: 15px; background: #000; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 12px; background: #20202b; max-width: 85%; position: relative; }
        .me { align-self: flex-end; background: #2d1b4d; border: 1px solid #8a2be2; }
        .header { background: #1f1f29; padding: 10px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="hidden" style="padding:50px; text-align:center;">
        <h1 style="color:#8a2be2">VORTEX</h1>
        <p>Crie seu nome de usuário único</p>
        <input type="text" id="nick" placeholder="Seu nome..." style="width:100%; padding:12px; border-radius:8px; border:none; margin-bottom:10px;">
        <button onclick="criarConta()" style="width:100%; padding:12px; background:#8a2be2; color:#fff; border:none; border-radius:8px; font-weight:bold;">CRIAR CONTA</button>
    </div>

    <div id="lista-screen">
        <div style="padding:20px; font-weight:bold; border-bottom:1px solid #333;">Meus Grupos</div>
        <div id="container-grupos"></div>
    </div>

    <div id="chat-screen" class="hidden" style="height:100%; display:flex; flex-direction:column;">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="location.href='chat.html'"></i>
            <img id="h-img" src="" style="width:40px; height:40px; border-radius:50%;">
            <b id="h-name"></b>
        </div>
        <div id="win"></div>
        <div id="input-bar" class="header">
            <input type="text" id="txt" placeholder="Mensagem..." style="flex:1; padding:10px; border-radius:20px; border:none;">
            <button onclick="enviar()" style="background:#8a2be2; border:none; color:#fff; width:40px; height:40px; border-radius:50%;"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div id="closed-msg" class="hidden" style="padding:15px; text-align:center; color:red;">GRUPO FECHADO PELO ADMIN</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCbLVtiN0JlJ5qjMWyYtwUHEs8NP6DTaPM",
        databaseURL: "https://chat-4b3e3-default-rtdb.firebaseio.com",
        projectId: "chat-4b3e3",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const user = localStorage.getItem('vortex_u');
    const url = new URLSearchParams(window.location.search);
    const gid = url.get('g'), token = url.get('t');

    // 1. Lógica de Conta
    async function criarConta() {
        const n = document.getElementById('nick').value.trim();
        if(!n) return;
        const s = await db.ref('users/'+n).once('value');
        if(s.exists()) return alert("Nome já em uso!");
        await db.ref('users/'+n).set(true);
        localStorage.setItem('vortex_u', n);
        location.reload();
    }

    if(!user) {
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('lista-screen').classList.add('hidden');
    } else if(!gid) {
        // 2. Lista de Grupos
        db.ref('groups').on('value', snap => {
            const c = document.getElementById('container-grupos');
            c.innerHTML = "";
            snap.forEach(child => {
                const g = child.val();
                c.innerHTML += `<div class="item" onclick="location.href='chat.html?g=${g.id}&t=${g.token}'"><img src="${g.pic}"><b>${g.name}</b></div>`;
            });
        });
    } else {
        // 3. Entrar no Chat e Verificar Ban
        db.ref('bans/'+gid+'/'+user).on('value', s => {
            if(s.exists()) { document.body.innerHTML = "<h1 style='color:white; text-align:center'>VOCÊ FOI BANIDO DESTE GRUPO</h1>"; }
        });

        document.getElementById('lista-screen').classList.add('hidden');
        document.getElementById('chat-screen').classList.remove('hidden');

        db.ref('groups/' + gid).on('value', snap => {
            const g = snap.val();
            if(!g || g.token !== token) return location.href='chat.html';
            document.getElementById('h-name').innerText = g.name;
            document.getElementById('h-img').src = g.pic;
            if(g.status == 'fechado') {
                document.getElementById('input-bar').classList.add('hidden');
                document.getElementById('closed-msg').classList.remove('hidden');
            } else {
                document.getElementById('input-bar').classList.remove('hidden');
                document.getElementById('closed-msg').classList.add('hidden');
            }
        });

        db.ref('messages/' + gid).on('value', snap => {
            const win = document.getElementById('win');
            win.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                win.innerHTML += `<div class="msg ${m.user == user ? 'me' : ''}">
                    <b style="font-size:11px; color:#8a2be2">${m.user}</b><br>${m.text}
                </div>`;
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    function enviar() {
        const t = document.getElementById('txt').value;
        if(t) { db.ref('messages/'+gid).push({user, text: t}); document.getElementById('txt').value = ""; }
    }
</script>
</body>
</html>
